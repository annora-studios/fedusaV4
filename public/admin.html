<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FEDUSA Admin</title><link rel="stylesheet" href="/styles.css"></head><body>
<header class="topbar"><div class="brand"><div class="logo-mark"><img src="/assets/Fedusalogo.svg" alt="FEDUSA"></div><div><strong>FEDUSA</strong><span>Administration Portal</span></div></div><div><a href="/" style="color:#fff">Registration</a></div></header>
<main class="page-wrap"><section class="field-card"><div class="section-head"><div><span class="eyebrow">ADMIN LOGIN</span><h1>Delegate administration</h1></div></div><div class="form-grid"><label>Admin PIN<input id="pin" type="password"></label><div class="actions" style="padding:0;justify-content:flex-start;align-items:end"><button class="primary-btn" id="load">Load delegates</button><button class="outline-btn" id="export">Download Excel</button><a class="outline-btn" href="/badges.html" style="text-decoration:none">Print badges</a><a class="outline-btn" href="/checkin.html" style="text-decoration:none">Check-in</a></div></div><div id="msg" class="error hidden"></div></section>
<section class="field-card" style="margin-top:20px"><div class="section-head"><h2>Registered delegates</h2><select id="filter" style="max-width:240px"><option value="all">All attendee types</option><option value="affiliate">Affiliate attendees</option><option value="main">VIP / Main delegates</option></select></div><div style="overflow:auto"><table style="border-collapse:collapse;width:100%;min-width:1450px"><thead><tr><th>Photo</th><th>Type</th><th>Name</th><th>Affiliate</th><th>Email</th><th>Mobile</th><th>Flights</th><th>Accommodation</th><th>Size</th><th>Voting</th><th>Checked in</th><th>Actions</th><th>QR</th></tr></thead><tbody id="rows"></tbody></table></div></section>
<section class="field-card" style="margin-top:20px"><div class="section-head"><h2>Recent audit activity</h2><button class="outline-btn" id="auditLoad">Refresh audit</button></div><div id="auditRows" style="display:grid;gap:8px"></div></section></main>
<style>th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;font-size:12px}th{background:#eef3f8}.thumb{width:48px;height:58px;object-fit:cover;border-radius:5px}.qr{width:58px;height:58px}.admin-actions{display:flex;flex-wrap:wrap;gap:6px}.admin-actions button{font-size:11px;padding:7px 9px}.audit-item{border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff}</style>
<script>
const pin=document.querySelector('#pin'),rowsEl=document.querySelector('#rows'),msg=document.querySelector('#msg'),filter=document.querySelector('#filter'),auditRows=document.querySelector('#auditRows');let all=[];pin.value=sessionStorage.adminPin||'';document.querySelector('#load').onclick=load;document.querySelector('#export').onclick=()=>{sessionStorage.adminPin=pin.value;location.href='/api/export?pin='+encodeURIComponent(pin.value)};document.querySelector('#auditLoad').onclick=loadAudit;filter.onchange=render;
async function load(){sessionStorage.adminPin=pin.value;msg.classList.add('hidden');const r=await fetch('/api/delegates?pin='+encodeURIComponent(pin.value)),d=await r.json();if(!r.ok){msg.textContent=d.error||'Unable to load';msg.classList.remove('hidden');return}all=d.delegates;render();loadAudit()}
function render(){const list=filter.value==='all'?all:all.filter(x=>x.registrationType===filter.value);rowsEl.innerHTML=list.map(x=>`<tr><td><img class="thumb" src="${x.headshotUrl}"></td><td>${x.registrationType==='affiliate'?'Affiliate':'VIP / Main'}</td><td><b>${esc(x.fullName)}</b><br>${esc(x.jobTitle)}</td><td>${esc(x.affiliate||'—')}</td><td>${esc(x.email)}</td><td>${esc(x.mobile)}</td><td>In: ${esc(x.inboundFlight?.status||'')} ${esc(x.inboundFlight?.date||'')}<br>Out: ${esc(x.outboundFlight?.status||'')} ${esc(x.outboundFlight?.date||'')}</td><td>${x.accommodation?.required==='Yes'?`${esc(x.accommodation.checkIn||'')} to ${esc(x.accommodation.checkOut||'')}`:'No'}</td><td>${esc(x.shirtJacketSize)}</td><td>${esc(x.votingMember)}</td><td>${x.checkedInAt?new Date(x.checkedInAt).toLocaleString():'No'}</td><td><div class="admin-actions"><button class="outline-btn" onclick="editDelegate('${x.delegateId}')">Edit</button><button class="outline-btn" onclick="action('${x.delegateId}','resend')">Resend email</button><button class="outline-btn" onclick="action('${x.delegateId}','regenerate-link')">New link</button><button class="outline-btn" onclick="changeCategory('${x.delegateId}','${x.registrationType}')">Change type</button></div></td><td><img class="qr" src="${x.badgeQrUrl}">${x.votingQrUrl?`<img class="qr" src="${x.votingQrUrl}">`:''}</td></tr>`).join('')}
async function action(delegateId,actionName,extra={}){const r=await fetch('/api/admin-actions',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({pin:pin.value,delegateId,action:actionName,...extra})}),d=await r.json();if(!r.ok)return alert(d.error||'Action failed');alert(actionName==='resend'?'Confirmation email sent.':'A new secure link was generated and emailed.');loadAudit()}
async function changeCategory(delegateId,current){const target=current==='main'?'affiliate':'main';let extra={registrationType:target};if(target==='affiliate'){const affiliate=prompt('Affiliate name:');if(!affiliate)return;extra.affiliate=affiliate;}if(!confirm(`Change this delegate to ${target==='main'?'VIP / Main':'Affiliate'}?`))return;await action(delegateId,'change-category',extra);await load()}
function editDelegate(id){const x=all.find(d=>d.delegateId===id);if(!x)return;editId.value=id;editName.value=x.fullName||'';editOrg.value=x.jobTitle||'';editEmail.value=x.email||'';editMobile.value=x.mobile||'';editDialog.showModal()}
async function loadAudit(){const r=await fetch('/api/admin-actions?pin='+encodeURIComponent(pin.value)+'&limit=100'),d=await r.json();if(!r.ok){auditRows.innerHTML='';return}auditRows.innerHTML=d.audit.map(a=>`<div class="audit-item"><b>${esc(a.action)}</b> <small>${new Date(a.at).toLocaleString()}</small><br><span>${esc(a.actor||'')} ${a.registrationId?' | '+esc(a.registrationId):''}${a.delegateId?' | '+esc(a.delegateId):''}</span></div>`).join('')||'<p>No audit records yet.</p>'}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
</script>
<dialog id="editDialog"><form method="dialog" id="editForm" class="card"><h2>Edit delegate</h2><input id="editId" type="hidden"><label>Full Name<input id="editName"></label><label>Organisation / Job Title<input id="editOrg"></label><label>Email<input id="editEmail" type="email"></label><label>Mobile<input id="editMobile"></label><div class="actions"><button class="primary-btn" value="save" id="saveEdit">Save</button><button class="outline-btn" value="cancel">Cancel</button></div></form></dialog>
<script>saveEdit.addEventListener('click',async e=>{e.preventDefault();const r=await fetch('/api/admin-update',{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify({pin:pin.value,delegateId:editId.value,changes:{fullName:editName.value,jobTitle:editOrg.value,email:editEmail.value,mobile:editMobile.value}})}),d=await r.json();if(r.ok){editDialog.close();load()}else alert(d.error)});</script></body></html>
