<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FEDUSA Check-in</title><link rel="stylesheet" href="/styles.css"></head><body><header class="topbar"><div class="brand"><div class="logo-mark"><img src="/assets/Fedusalogo.svg"></div><div><strong>FEDUSA</strong><span>Congress Check-in</span></div></div></header><main class="page-wrap"><section class="card scanner-box"><div id="login"><h2>Staff sign in</h2><label>Username<input id="username"></label><label>Password<input id="password" type="password"></label><button id="loginBtn" class="btn primary">Sign in</button></div><div id="scanner" class="hidden"><h2>Scan or enter badge code</h2><p id="staffName"></p><input id="code" autofocus placeholder="Scan QR code"><div class="actions"><button id="scanBtn" class="btn primary">Check In</button><button id="manualBtn" class="btn secondary">Manual Override</button></div><div id="result"></div></div></section></main><script>let session=localStorage.fedusaStaffToken||'';const login=document.querySelector('#login'),scanner=document.querySelector('#scanner');function show(){login.classList.add('hidden');scanner.classList.remove('hidden')}if(session)show();loginBtn.onclick=async()=>{const r=await fetch('/api/staff-login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({username:username.value,password:password.value})}),d=await r.json();if(!r.ok)return alert(d.error);session=d.token;localStorage.fedusaStaffToken=session;staffName.textContent=`Signed in as ${d.user.name}`;show()};async function go(method='scan'){let reason='';if(method==='manual'){reason=prompt('Reason for manual override:')||'';if(!reason)return}const r=await fetch('/api/checkin-sync',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({token:session,checkins:[{localId:Date.now().toString(),code:code.value.trim(),method,reason,scannedAt:new Date().toISOString()}]})}),d=await r.json();if(!r.ok){result.className='error';result.textContent=d.error;return}const x=d.results[0];result.className=x.status==='checked_in'?'success':'error';result.innerHTML=x.delegate?`<strong>${x.status==='duplicate'?'Already checked in':'Check-in successful'}</strong><br>${x.delegate.fullName}<br>${x.delegate.registrationType==='main'?'VIP / Main Delegate':'Affiliate Attendee'}${x.delegate.votingMember==='Yes'?'<br>Voting Member':''}`:'Not found';code.value='';code.focus()}scanBtn.onclick=()=>go('scan');manualBtn.onclick=()=>go('manual');code.onkeydown=e=>{if(e.key==='Enter')go('scan')}</script></body></html>
