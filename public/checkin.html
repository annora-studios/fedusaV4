<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FEDUSA Scanner</title><link rel="stylesheet" href="/styles.css">
<style>
.scanner-page{max-width:920px;margin:32px auto}.scanner-card{overflow:hidden;padding:0}.scanner-head{background:linear-gradient(135deg,#08275c,#0d3d82);color:#fff;padding:24px}.scanner-body{padding:24px}.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.mode-btn{border:2px solid #dce5ef;border-radius:14px;background:#fff;padding:22px;text-align:left;cursor:pointer}.mode-btn.active{border-color:#20a651;box-shadow:0 0 0 3px rgba(32,166,81,.13)}.mode-btn strong{display:block;font-size:18px}.mode-btn span{display:block;color:#5d6b7c;margin-top:4px}.scan-panel{margin-top:20px;border-radius:14px;background:#f4f7fb;padding:20px}.scan-input{font-size:20px;padding:16px}.session-row{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}.stat{background:#fff;border:1px solid #dce5ef;border-radius:10px;padding:13px}.stat b{display:block;font-size:22px}.result-card{margin-top:16px;padding:18px;border-radius:12px}.result-card.success{background:#e9f8ef;color:#0b6730}.result-card.error{background:#fff0f0;color:#9a1d1d}.hidden{display:none!important}@media(max-width:650px){.mode-grid,.status-grid{grid-template-columns:1fr}.scanner-page{margin:16px}.scanner-body,.scanner-head{padding:18px}}
</style></head>
<body>
<header class="topbar"><div class="brand"><div class="logo-mark"><img src="/assets/Fedusalogo.svg" alt="FEDUSA"></div><div><strong>FEDUSA</strong><span>Congress 2026 Scanner</span></div></div></header>
<main class="page-wrap scanner-page"><section class="card scanner-card">
<div class="scanner-head"><span class="eyebrow">14–16 OCTOBER 2026</span><h1>Delegate check-in</h1><p>One badge QR works for both congress attendance and voting-session access.</p></div>
<div class="scanner-body">
<div id="login"><h2>Staff sign in</h2><div class="form-grid"><label>Username<input id="username" autocomplete="username"></label><label>Password<input id="password" type="password" autocomplete="current-password"></label></div><button id="loginBtn" class="primary-btn">Sign in</button><div id="loginError" class="error hidden"></div></div>
<div id="scanner" class="hidden">
<div class="session-row"><div><b id="staffName">Staff session</b><div id="staffRole"></div></div><button id="logoutBtn" class="outline-btn">Sign out</button></div>
<h2>Select scanner mode</h2><div class="mode-grid"><button class="mode-btn active" data-mode="congress"><strong>Congress check-in</strong><span>Record entry to the main congress.</span></button><button class="mode-btn" data-mode="voting"><strong>Voting session</strong><span>Allow registered voting members only.</span></button></div>
<div class="scan-panel"><label id="scanLabel">Scan congress badge QR<input id="code" class="scan-input" autofocus placeholder="Scan QR code or enter badge ID"></label><div class="actions"><button id="scanBtn" class="primary-btn">Check in</button><button id="manualBtn" class="outline-btn">Manual override</button></div><div id="result" class="hidden"></div></div>
<div class="status-grid"><div class="stat"><span>Successful</span><b id="successCount">0</b></div><div class="stat"><span>Duplicates</span><b id="duplicateCount">0</b></div><div class="stat"><span>Denied / not found</span><b id="deniedCount">0</b></div></div>
</div></div></section></main>
<script>
let session=localStorage.fedusaStaffToken||'',mode='congress',counts={success:0,duplicate:0,denied:0};
const $=s=>document.querySelector(s),login=$('#login'),scanner=$('#scanner'),result=$('#result'),code=$('#code');
function showScanner(user){login.classList.add('hidden');scanner.classList.remove('hidden');if(user){$('#staffName').textContent=`Signed in as ${user.name}`;$('#staffRole').textContent=`${user.role||'scanner'}${user.location?' • '+user.location:''}`;}code.focus()}
if(session)showScanner();
$('#loginBtn').onclick=async()=>{const error=$('#loginError');error.classList.add('hidden');const r=await fetch('/api/staff-login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({username:$('#username').value,password:$('#password').value})}),d=await r.json();if(!r.ok){error.textContent=d.error||'Sign-in failed';error.classList.remove('hidden');return}session=d.token;localStorage.fedusaStaffToken=session;showScanner(d.user)};
$('#logoutBtn').onclick=()=>{localStorage.removeItem('fedusaStaffToken');location.reload()};
document.querySelectorAll('.mode-btn').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;document.querySelectorAll('.mode-btn').forEach(x=>x.classList.toggle('active',x===b));$('#scanLabel').childNodes[0].textContent=mode==='voting'?'Scan voting member badge QR':'Scan congress badge QR';code.focus()});
function updateCounts(status){if(status==='checked_in')counts.success++;else if(status==='duplicate')counts.duplicate++;else counts.denied++;$('#successCount').textContent=counts.success;$('#duplicateCount').textContent=counts.duplicate;$('#deniedCount').textContent=counts.denied}
async function go(method='scan'){const value=code.value.trim();if(!value)return;let reason='';if(method==='manual'){reason=prompt('Reason for manual override:')||'';if(!reason)return}result.className='result-card';result.textContent='Checking…';result.classList.remove('hidden');const r=await fetch('/api/checkin-sync',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({token:session,checkins:[{localId:crypto.randomUUID?.()||Date.now().toString(),code:value,mode,method,reason,scannedAt:new Date().toISOString()}]})}),d=await r.json();if(r.status===401){localStorage.removeItem('fedusaStaffToken');location.reload();return}if(!r.ok){result.classList.add('error');result.textContent=d.error||'Check-in failed';return}const x=d.results[0];updateCounts(x.status);const labels={checked_in:mode==='voting'?'Voting access recorded':'Congress check-in successful',duplicate:mode==='voting'?'Already admitted to voting':'Already checked in',not_eligible:'Not eligible to vote',not_found:'Badge not found'};result.classList.add(x.status==='checked_in'?'success':'error');result.innerHTML=`<strong>${labels[x.status]||x.status}</strong>${x.delegate?`<br>${escapeHtml(x.delegate.fullName)}<br>${x.delegate.registrationType==='main'?'VIP / Main Delegate':'Affiliate Attendee'}${x.delegate.votingMember==='Yes'?'<br>Voting Member':''}`:''}`;code.value='';code.focus()}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
$('#scanBtn').onclick=()=>go('scan');$('#manualBtn').onclick=()=>go('manual');code.onkeydown=e=>{if(e.key==='Enter')go('scan')};
</script></body></html>
