<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Retrieve FEDUSA Registration</title><link rel="stylesheet" href="/styles.css"></head><body>
<header class="topbar"><div class="brand"><div class="logo-mark"><img src="/assets/Fedusalogo.svg" alt="FEDUSA"></div><div><strong>FEDUSA</strong><span>Congress Registration</span></div></div><div><a href="/" style="color:#fff">Registration</a></div></header>
<main class="page-wrap"><section class="path-intro"><span class="eyebrow">RETRIEVE REGISTRATION</span><h2>Request your management link</h2><p>Enter the email address or mobile number used during registration. For Affiliate registrations, the link will be sent to the Logistics Contact.</p></section>
<section class="form-shell" style="display:block"><form id="retrieveForm" class="main-card"><div class="form-section"><div class="form-grid"><label>Email address<input id="retrieveEmail" type="email"></label><label>Mobile number<input id="retrieveMobile"></label></div><p class="section-subtitle">Only one field is required.</p><div id="retrieveMessage" class="hidden"></div></div><div class="actions"><a class="outline-btn" href="/">Back</a><button class="primary-btn" type="submit">Email My Link</button></div></form></section></main>
<script>const f=document.querySelector('#retrieveForm'),m=document.querySelector('#retrieveMessage');f.onsubmit=async e=>{e.preventDefault();m.className='hidden';const email=document.querySelector('#retrieveEmail').value.trim(),mobile=document.querySelector('#retrieveMobile').value.trim();if(!email&&!mobile){m.className='error';m.textContent='Enter an email address or mobile number.';return}const b=e.submitter;b.disabled=true;b.textContent='Sending...';try{const r=await fetch('/api/retrieve-registration',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email,mobile})}),d=await r.json();m.className=r.ok?'success':'error';m.textContent=d.message||d.error;}finally{b.disabled=false;b.textContent='Email My Link';}};</script></body></html>
