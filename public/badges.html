<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FEDUSA Badges</title><link rel="stylesheet" href="/styles.css"></head><body>
<header class="topbar"><div class="brand"><div class="logo-mark">LOGO</div><div><strong>FEDUSA</strong><span>Badge Printing</span></div></div><a href="/admin.html" style="color:#fff">Admin</a></header>
<main class="page-wrap"><section class="field-card no-print"><div class="form-grid"><label>Admin PIN<input id="pin" type="password"></label><div class="actions" style="padding:0;justify-content:flex-start;align-items:end"><button class="primary-btn" id="load">Load badges</button><button class="outline-btn" onclick="print()">Print badges</button></div></div><div id="msg" class="error hidden"></div></section><div id="badges" class="badge-sheet"></div></main>
<style>.badge-sheet{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-top:20px}.badge-card{background:#fff;border:1px solid #1b273d;min-height:340px;padding:18px;display:grid;grid-template-columns:115px 1fr 105px;gap:16px;align-items:center;break-inside:avoid}.badge-photo{width:105px;height:135px;object-fit:cover;border-radius:7px}.badge-card h2{font-size:24px;margin:6px 0}.badge-card p{margin:4px 0}.qr-stack img{width:96px;height:96px;display:block}.qr-stack small{display:block;text-align:center;font-weight:800}.voting{color:var(--green);font-weight:900}.type-pill{display:inline-block;padding:4px 7px;border-radius:12px;background:#e8f1ff;color:var(--blue2);font-size:10px;font-weight:900}@media(max-width:800px){.badge-sheet{grid-template-columns:1fr}}@media print{.topbar,.no-print{display:none!important}.page-wrap{padding:0}.badge-sheet{gap:5mm}.badge-card{min-height:88mm;page-break-inside:avoid}}</style>
<script>
const pin=document.querySelector('#pin'),badges=document.querySelector('#badges'),msg=document.querySelector('#msg');pin.value=sessionStorage.adminPin||'';document.querySelector('#load').onclick=async()=>{sessionStorage.adminPin=pin.value;const r=await fetch('/api/delegates?pin='+encodeURIComponent(pin.value)),d=await r.json();if(!r.ok){msg.textContent=d.error;msg.classList.remove('hidden');return}badges.innerHTML=d.delegates.map(x=>`<article class="badge-card"><img class="badge-photo" src="${x.headshotUrl}"><div><span class="type-pill">${x.registrationType==='affiliate'?'AFFILIATE ATTENDEE':'VIP / MAIN DELEGATE'}</span><h2>${esc(x.fullName)}</h2><p>${esc(x.jobTitle||'Delegate')}</p><p><strong>${esc(x.affiliate||'FEDUSA Conference')}</strong></p>${x.votingMember==='Yes'?'<p class="voting">VOTING MEMBER</p>':''}<p><small>Badge ID: ${esc(x.badgeId)}</small></p></div><div class="qr-stack"><img src="${x.badgeQrUrl}"><small>Badge QR</small><small>One QR for congress and voting</small></div></article>`).join('')};function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
</script></body></html>
